<!DOCTYPE html>
<html>
<head>
<title>Video Clips Maker</title>
<style>
body {font-family:Arial; background:#f4f4f4; text-align:center; margin-top:50px;}
input {width:60%; padding:10px;}
button {padding:10px 20px; background:#28a745; color:white; border:none;}
ul {list-style:none;}
</style>
</head>
<body>

<h1>Video Clips Maker</h1>

<form method="POST">
<input type="text" name="youtube_url" placeholder="Paste YouTube URL" required><br><br>
<button type="submit">Start</button>
</form>

{% if clips %}
<h2>Clips:</h2>
<ul>
{% for clip in clips %}
<li><a href="{{ url_for('static', filename=clip) }}">{{ clip }}</a></li>
{% endfor %}
</ul>
{% endif %}

</body>
</html>
